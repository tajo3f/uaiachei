<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uai, Achei na Shopee | O Maior Portal de Achadinhos do Brasil</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary: #FF4500; 
            --primary-hover: #E63E00;
            --primary-glow: rgba(255, 69, 0, 0.4);
            --gold: #D4AF37;
            --dark-pure: #000000;
            --dark-matte: #0D0D0D;
            --dark-card: #161616;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-dim: #999999;
            --text-muted: #555555;
            --success: #00FF88;
            --glass: rgba(13, 13, 13, 0.9);
            --transition-ultra: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* RESET & GLOBAL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--dark-pure); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        
        /* HEADER AMPLIADO */
        header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 5000; background: var(--glass); 
            backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); padding: 25px 6%;
            display: flex; justify-content: space-between; align-items: center; transition: 0.4s;
        }
        header.scrolled { padding: 15px 6%; background: rgba(0, 0, 0, 0.98); }
        .logo-nav { height: 65px; width: auto; }
        .btn-insta-header { background: var(--primary); color: white; padding: 14px 32px; border-radius: 100px; font-weight: 800; display: flex; align-items: center; gap: 10px; font-size: 1rem; }

        /* HERO SECTON (MAIOR) */
        .hero {
            padding: clamp(180px, 25vh, 250px) 6% 120px; min-height: 85vh; display: flex; flex-direction: column; align-items: center; text-align: center;
            background: radial-gradient(circle at 50% 30%, rgba(255, 69, 0, 0.15) 0%, transparent 60%);
        }
        .hero h1 { font-size: clamp(3.5rem, 9vw, 8rem); font-weight: 800; line-height: 0.85; letter-spacing: -4px; margin-bottom: 40px; }
        .hero h1 span { color: var(--primary); text-shadow: 0 0 50px var(--primary-glow); }
        .hero p { max-width: 900px; font-size: clamp(1.2rem, 2.5vw, 1.8rem); color: var(--text-dim); margin-bottom: 60px; }

        /* CATEGORIAS */
        .cat-strip { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin-bottom: 100px; width: 100%; }
        .cat-item {
            background: var(--dark-card); border: 1px solid var(--border); padding: 35px;
            border-radius: 35px; width: 240px; text-align: center; transition: 0.4s ease;
        }
        .cat-item i { font-size: 3.2rem; color: var(--primary); margin-bottom: 15px; display: block; }
        .cat-item span { font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }

        /* CATALOGO AMPLIADO */
        .catalog { padding: 120px 6%; background: var(--dark-matte); border-radius: 80px 80px 0 0; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); 
            gap: 50px; 
            max-width: 1600px; 
            margin: 0 auto;
        }
        
        .card-achado {
            background: var(--dark-card); border: 1px solid var(--border); border-radius: 50px; padding: 30px;
            transition: var(--transition-ultra); display: flex; flex-direction: column; position: relative;
        }
        .card-achado:hover { transform: translateY(-15px); border-color: var(--primary); }
        .card-img { width: 100%; aspect-ratio: 1/1; border-radius: 40px; overflow: hidden; margin-bottom: 30px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }

        .card-achado h3 { font-size: 1.7rem; font-weight: 700; margin-bottom: 25px; color: white; line-height: 1.2; min-height: 4rem; }
        .old-p { color: var(--text-muted); text-decoration: line-through; font-size: 1.2rem; }
        .new-p { color: var(--success); font-size: 3rem; font-weight: 800; line-height: 1; margin-bottom: 25px; display: block; }
        
        .btn-link { width: 100%; background: white; color: black; padding: 25px; border-radius: 25px; font-weight: 900; text-align: center; display: block; font-size: 1.3rem; }
        .card-achado:hover .btn-link { background: var(--primary); color: white; }

        /* NOTIFICAÇÃO */
        .live-notif {
            position: fixed; bottom: 40px; right: 40px; background: white; color: black;
            padding: 22px 35px; border-radius: 30px; display: flex; align-items: center; gap: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); z-index: 9999; transform: translateY(250px);
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .live-notif.show { transform: translateY(0); }

        footer { padding: 120px 6%; background: var(--dark-matte); text-align: center; border-top: 1px solid var(--border); }

        @media (max-width: 900px) {
            .product-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 4rem; }
            .live-notif { left: 20px; right: 20px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="live-notif" id="liveNotif">
        <div style="width: 12px; height: 12px; background: var(--primary); border-radius: 50%;"></div>
        <p id="notifText" style="font-weight: 600;"></p>
    </div>

    <header id="mainHeader">
        <img src="https://i.postimg.cc/NfMGQByv/Chat-GPT-Image-24-de-abr-de-2026-11-15-07.png" class="logo-nav">
        <a href="https://www.instagram.com/uaiacheibr" target="_blank" class="btn-insta-header">
            <i class="ph-bold ph-instagram-logo"></i> @UAIACHEIBR
        </a>
    </header>

    <main>
        <section class="hero">
            <h1>A Curadoria <span>Mais Insana</span></h1>
            <p>O robô do Uai Achei varre a Shopee 24h por dia atrás de preços errados para você.</p>
            
            <div class="cat-strip">
                <div class="cat-item"><i class="ph-fill ph-lightning"></i><span>Promoções</span></div>
                <div class="cat-item"><i class="ph-fill ph-device-mobile"></i><span>Tecnologia</span></div>
                <div class="cat-item"><i class="ph-fill ph-armchair"></i><span>Casa</span></div>
            </div>
        </section>

        <section class="catalog" id="achadinhos">
            <div class="product-grid" id="productGrid">
                </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Uai, Achei na Shopee</p>
    </footer>

    <script>
        const MEUS_PRODUTOS = [
            { 
                id: 1, 
                nome: "Corretor de Postura Premium – Alinhamento da Coluna", 
                precoAntigo: "R$ 39,99", 
                precoNovo: "R$ 14,88", 
                img: "https://down-br.img.susercontent.com/file/br-11134207-7r98o-lwyhrg9sci4f9e.webp", 
                link: "https://s.shopee.com.br/4LFgvmMQZY" 
            },
            { 
                id: 2, 
                nome: "Fone Bluetooth AirDots 3 Pro - Original", 
                precoAntigo: "R$ 180,00", 
                precoNovo: "R$ 89,90", 
                img: "https://via.placeholder.com/600", 
                link: "#" 
            }
        ];

        const f_nomes = ["Biel", "Julia", "Thiago", "Amanda", "Lucas", "Carla"];
        const f_cidades = ["Vitória", "São Paulo", "Rio de Janeiro", "Belo Horizonte"];

        function renderizar() {
            const grid = document.getElementById('productGrid');
            if(!grid) return;

            grid.innerHTML = MEUS_PRODUTOS.map(p => `
                <div class="card-achado">
                    <div class="card-img"><img src="${p.img}" alt="${p.nome}"></div>
                    <h3>${p.nome}</h3>
                    <div class="price-tag">
                        <span class="old-p">${p.precoAntigo}</span>
                        <span class="new-p">${p.precoNovo}</span>
                    </div>
                    <a href="${p.link}" target="_blank" class="btn-link">RESGATAR OFERTA</a>
                </div>
            `).join('');
        }

        function notif() {
            const el = document.getElementById('liveNotif');
            const txt = document.getElementById('notifText');
            const nome = f_nomes[Math.floor(Math.random() * f_nomes.length)];
            const cidade = f_cidades[Math.floor(Math.random() * f_cidades.length)];
            
            txt.innerHTML = `<b>${nome}</b> de ${cidade} acabou de comprar!`;
            el.classList.add('show');
            
            setTimeout(() => { el.classList.remove('show'); }, 5000);
            setTimeout(notif, Math.random() * 10000 + 10000);
        }

        // INICIALIZAÇÃO SEM LOADER
        window.addEventListener('DOMContentLoaded', () => {
            renderizar();
            notif();
            
            // Animação de entrada suave
            gsap.from(".hero h1", { opacity: 0, y: 50, duration: 1 });
            gsap.from(".hero p", { opacity: 0, y: 30, duration: 1, delay: 0.3 });
            gsap.from(".card-achado", { opacity: 0, y: 50, stagger: 0.2, duration: 0.8, delay: 0.5 });
        });

        window.addEventListener('scroll', () => {
            document.getElementById('mainHeader').classList.toggle('scrolled', window.scrollY > 80);
        });
    </script>
</body>
</html>
